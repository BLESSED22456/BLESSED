    // Mouse-following Magnet effect component
    const Magnet = ({ children, padding = 150, strength = 3, className = "" }) => {
      const containerRef = useRef(null);
      const [transform, setTransform] = useState({ x: 0, y: 0 });
      const [transition, setTransition] = useState("");

      const handleMouseMove = (e) => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        
        // Find cursor position relative to viewport
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        // Calculate center of target element
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        // Calculate distance from center
        const distX = mouseX - centerX;
        const distY = mouseY - centerY;

        // Determine if mouse is within active padding zone
        const distance = Math.sqrt(distX * distX + distY * distY);
        const maxRadius = Math.max(rect.width, rect.height) + padding;

        if (distance < maxRadius) {
          // Magnetism: stronger near center
          setTransition("transform 0.3s ease-out");
          setTransform({
            x: distX / strength,
            y: distY / strength
          });
        } else {
          setTransition("transform 0.6s ease-in-out");
          setTransform({ x: 0, y: 0 });
        }
      };

      const handleMouseLeave = () => {
        setTransition("transform 0.6s ease-in-out");
        setTransform({ x: 0, y: 0 });
      };

      return (
        <div 
          ref={containerRef}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          className={`relative inline-block ${className}`}
          style={{ 
            transform: `translate3d(${transform.x}px, ${transform.y}px, 0)`,
            transition,
            willChange: 'transform'
          }}
        >
          {children}
        </div>
      );
    };

            const rangeStart = index / chars.length;
            const rangeEnd = (index + 1.5) / chars.length;
            
            // Map scroll progress to character opacity (0.2 to 1)
            const opacity = useTransform(
              scrollYProgress, 
              [Math.max(0, rangeStart), Math.min(1, rangeEnd)], 
              [0.2, 1]
            );

            return (
              <motion.span 
                key={index} 
                style={{ opacity }} 
                className="inline-block whitespace-pre"
              >

      const row1Data = [...designImages, ...designImages, ...designImages, ...designImages];
      const row2Data = [...designImages, ...designImages, ...designImages, ...designImages].reverse();

      useEffect(() => {
        const handleScroll = () => {
          if (!sectionRef.current) return;
          const rect = sectionRef.current.getBoundingClientRect();
          const sectionTop = window.scrollY + rect.top;
          
          // Calculate offset based on scroll position relative to marquee section
          const offset = (window.scrollY - sectionTop + window.innerHeight) * 0.3;
          
          if (row1Ref.current) {
            row1Ref.current.style.transform = `translate3d(${offset - 200}px, 0px, 0px)`;

          if (row2Ref.current) {
            row2Ref.current.style.transform = `translate3d(${-(offset - 200)}px, 0px, 0px)`;
          }
        };

        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll(); // Trigger initial position calculation
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

                              </span>
                              <button 
                                onClick={() => onUpdateQuantity(idx, 1)}
                                className="p-1 hover:bg-zinc-800 transition-colors text-brandLight/70"
                              >
                                <Plus className="w-3.5 h-3.5" />
                              </button>
                            </div>

                            {/* Cost & Remove */}
                            <div className="flex items-center gap-3">
                              <span className="font-bold text-sm text-white">
                                ₹{(item.product.price * item.quantity).toLocaleString()}
                              </span>
                              <button 
                                onClick={() => onRemoveItem(idx)}
                                className="text-zinc-500 hover:text-red-500 text-xs transition-colors"
                              >
                                Remove
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))
                  )}
                </div>

                {/* Subtotal & Checkout Block */}
                {cartItems.length > 0 && (
                  <div className="border-t border-brandLight/10 pt-5 mt-6 space-y-4">
                    <div className="flex justify-between items-center font-medium">
                      <span className="text-brandLight/60 uppercase text-xs tracking-wider">Subtotal</span>
                      <span className="text-xl font-black text-white">₹{subtotal.toLocaleString()}</span>
                    </div>
                    <p className="text-[11px] text-brandLight/40 leading-normal">
                      Shipping costs, taxes, and discounts calculated during checkout. Secure payments powered by Stripe technology.
                    </p>
                    <button
                      onClick={onCheckout}
                      className="w-full py-4 bg-brandLight text-brandDark hover:bg-white text-sm font-black uppercase tracking-widest rounded-xl transition-all duration-200 active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-brandLight/5"
                    >
                      Proceed to Checkout
                      <ArrowRight className="w-4 h-4" />
                    </button>
                  </div>
                )}
              </motion.div>
            </>
          )}
        </AnimatePresence>
      );
    };

    // ==========================================
    // INTERACTIVE CHECKOUT MODAL
    // ==========================================
    const CheckoutModal = ({ isOpen, onClose, cartItems, onOrderComplete }) => {
      const [step, setStep] = useState(1); // 1: Shipping, 2: Payment, 3: Processing, 4: Success
      const [formData, setFormData] = useState({
        name: '', email: '', address: '', city: '', zip: '',
        cardNum: '', cardExp: '', cardCvc: ''
      });
      const [orderId, setOrderId] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('Prepaid'); // 'Prepaid' or 'COD'

      const cartSubtotal = cartItems.reduce((acc, item) => acc + item.product.price * item.quantity, 0);
      const shippingCharge = 69;
      const codCharge = paymentMethod === 'COD' ? 49 : 0;
      const orderTotal = cartSubtotal + shippingCharge + codCharge;

      useEffect(() => {
        if (isOpen) {
          setStep(1); // Reset modal when opened
          setPaymentMethod('Prepaid'); // Reset payment method to default Prepaid
        }
      }, [isOpen]);

      const handleInputChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleNext = async (e) => {
        e.preventDefault();
        if (step === 1) {
          setStep(2);
        } else if (step === 2) {
          setStep(3);
          try {
            const response = await fetch('/api/checkout', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                cartItems,
                gateway: paymentMethod, // 'COD' or 'Prepaid'
                shippingDetails: {
                  name: formData.name,
                  email: formData.email,
                  address: formData.address,
                  city: formData.city,
                  zip: formData.zip
                }
              })
            });
            const data = await response.json();
            if (response.ok && data.success) {
              setOrderId(data.order_id || 'BS-' + Math.floor(Math.random() * 900000 + 100000));
              setStep(4);
              onOrderComplete();
            } else {
              alert(data.error || 'Failed to place order via API. Please try again.');
              setStep(2);
            }
          } catch (err) {
            console.error('Checkout error:', err);
            alert('Failed to connect to the server checkout API. Please verify the server is running.');
            setStep(2);
          }
        }
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-x-hidden overflow-y-auto">
          {/* Backdrop */}
          <div className="fixed inset-0 bg-black/80 backdrop-blur-sm" onClick={step < 3 ? onClose : undefined} />

          {/* Modal Card */}
          <div className="relative w-full max-w-lg bg-zinc-900 border border-brandLight/10 rounded-[32px] shadow-2xl p-6 sm:p-8 text-brandLight z-55 overflow-hidden">
            
            {/* Close button (disable during processing or success) */}
            {step < 3 && (
              <button 
                onClick={onClose}
                className="absolute top-6 right-6 p-1 rounded-full hover:bg-zinc-800 text-brandLight/60 hover:text-white transition-colors"
              >
                <X className="w-5 h-5" />
              </button>
            )}

            {/* Stepper Progress Bar */}
            {step < 4 && (
              <div className="flex items-center justify-center gap-2 mb-8 select-none">
                <span className={`w-2.5 h-2.5 rounded-full ${step >= 1 ? 'bg-pink-500' : 'bg-zinc-700'}`} />
                <span className={`h-0.5 w-10 ${step >= 2 ? 'bg-pink-500' : 'bg-zinc-700'}`} />
                <span className={`w-2.5 h-2.5 rounded-full ${step >= 2 ? 'bg-pink-500' : 'bg-zinc-700'}`} />
                <span className={`h-0.5 w-10 ${step >= 3 ? 'bg-pink-500' : 'bg-zinc-700'}`} />
                <span className={`w-2.5 h-2.5 rounded-full ${step >= 3 ? 'bg-pink-500' : 'bg-zinc-700'}`} />
              </div>
            )}

            {/* 1. SHIPPING STEP */}
            {step === 1 && (
              <form onSubmit={handleNext} className="space-y-5">
                <div className="space-y-1">
                  <h3 className="text-xl font-bold uppercase tracking-wider text-white">Shipping Details</h3>
                  <p className="text-xs text-brandLight/50 font-light">Input your shipping address details below.</p>
                </div>

                <div className="space-y-3">
                  <div>
                    <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">Full Name</label>
                    <input 
                      type="text" required name="name" value={formData.name} onChange={handleInputChange}
                      className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                      placeholder="Jane Doe"
                    />
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">Email Address</label>
                    <input 
                      type="email" required name="email" value={formData.email} onChange={handleInputChange}
                      className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                      placeholder="jane@example.com"
                    />
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">Address</label>
                    <input 
                      type="text" required name="address" value={formData.address} onChange={handleInputChange}
                      className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                      placeholder="123 Grid Avenue"
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">City</label>
                      <input 
                        type="text" required name="city" value={formData.city} onChange={handleInputChange}
                        className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                        placeholder="San Francisco"
                      />
                    </div>
                    <div>
                      <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">ZIP / Postal Code</label>
                      <input 
                        type="text" required name="zip" value={formData.zip} onChange={handleInputChange}
                        className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                        placeholder="94103"
                      />
                    </div>
                  </div>
                </div>

                <div className="border-t border-brandLight/10 pt-4 flex justify-between items-center text-sm font-medium">
                  <span className="text-brandLight/50 uppercase text-xs">Total + Shipping</span>
                  <span className="text-lg font-bold text-white">₹{orderTotal.toLocaleString()}</span>
                </div>

                <button
                  type="submit"
                  className="w-full py-3.5 bg-brandLight text-brandDark hover:bg-white text-xs font-black uppercase tracking-widest rounded-xl transition-all duration-200 active:scale-95 flex items-center justify-center gap-2"
                >
                  Continue to Payment
                  <ArrowRight className="w-4 h-4" />
                </button>
              </form>
            )}

            {/* 2. PAYMENT STEP */}
            {step === 2 && (
              <form onSubmit={handleNext} className="space-y-5">
                <div className="space-y-1">
                  <h3 className="text-xl font-bold uppercase tracking-wider text-white">Payment Method</h3>
                  <p className="text-xs text-brandLight/50 font-light">Select your preferred payment option below.</p>
                </div>

                <div className="space-y-4">
                  {/* Prepaid Card Option */}
                  <div 
                    onClick={() => setPaymentMethod('Prepaid')}
                    className={`p-4 rounded-2xl border transition-all cursor-pointer flex items-center justify-between select-none ${
                      paymentMethod === 'Prepaid' 
                        ? 'border-brandLight bg-zinc-800/40 shadow-lg' 
                        : 'border-brandLight/10 bg-brandDark/40 hover:border-brandLight/30'
                    }`}
                  >
                    <div className="flex flex-col text-left">
                      <span className="text-sm font-semibold uppercase text-white">Prepaid Card</span>
                      <span className="text-[11px] text-brandLight/50 font-light mt-0.5">Secure payment via credit/debit card.</span>
                    </div>
                    <span className="text-[10px] uppercase tracking-wider text-green-500 font-bold bg-green-500/10 px-2 py-0.5 rounded-md">
                      Free Shipping
                    </span>
                  </div>

                  {/* COD Option */}
                  <div 
                    onClick={() => setPaymentMethod('COD')}
                    className={`p-4 rounded-2xl border transition-all cursor-pointer flex items-center justify-between select-none ${
                      paymentMethod === 'COD' 
                        ? 'border-brandLight bg-zinc-800/40 shadow-lg' 
                        : 'border-brandLight/10 bg-brandDark/40 hover:border-brandLight/30'
                    }`}
                  >
                    <div className="flex flex-col text-left">
                      <span className="text-sm font-semibold uppercase text-white">Cash on Delivery (COD)</span>
                      <span className="text-[11px] text-brandLight/50 font-light mt-0.5">Pay in cash when package arrives.</span>
                    </div>
                    <span className="text-[10px] uppercase tracking-wider text-pink-500 font-bold bg-pink-500/10 px-2 py-0.5 rounded-md">
                      + ₹49 COD Fee
                    </span>
                  </div>

                  {/* Prepaid Card Form Inputs (Only visible if Prepaid is selected) */}
                  {paymentMethod === 'Prepaid' && (
                    <div className="space-y-3 border-t border-brandLight/10 pt-4 mt-4 animate-fadeIn">
                      <div>
                        <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">Card Number</label>
                        <input 
                          type="text" required={paymentMethod === 'Prepaid'} name="cardNum" value={formData.cardNum} onChange={handleInputChange}
                          className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                          placeholder="4000 1234 5678 9010"
                          pattern="\d{16}|\d{4}\s\d{4}\s\d{4}\s\d{4}"
                          maxLength="19"
                        />
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">Expiry Date</label>
                          <input 
                            type="text" required={paymentMethod === 'Prepaid'} name="cardExp" value={formData.cardExp} onChange={handleInputChange}
                            className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                            placeholder="MM/YY"
                            maxLength="5"
                          />
                        </div>
                        <div>
                          <label className="text-[10px] uppercase font-bold tracking-widest text-brandLight/50 block mb-1">Security Code (CVC)</label>
                          <input 
                            type="password" required={paymentMethod === 'Prepaid'} name="cardCvc" value={formData.cardCvc} onChange={handleInputChange}
                            className="w-full bg-brandDark border border-brandLight/15 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brandLight text-white" 
                            placeholder="123"
                            maxLength="4"
                          />
                        </div>
                      </div>
                    </div>
                  )}

                  {/* COD Surcharge Notice (Only visible if COD is selected) */}
                  {paymentMethod === 'COD' && (
                    <div className="p-3 bg-pink-500/5 border border-pink-500/15 rounded-xl text-[11px] text-pink-500/80 leading-normal text-left font-light">
                      * Cash on Delivery adds an additional service helper charge of <strong>₹49</strong>. Please ensure cash is ready upon arrival.
                    </div>
                  )}
                </div>

                <div className="border-t border-brandLight/10 pt-4 flex justify-between items-center text-sm font-medium">
                  <span className="text-brandLight/50 uppercase text-xs">Total Charged</span>
                  <span className="text-lg font-bold text-white">₹{orderTotal.toLocaleString()}</span>
                </div>

                <div className="flex gap-3 pt-2">
                  <button
                    type="button" onClick={() => setStep(1)}
                    className="flex-1 py-3.5 border-2 border-brandLight/20 hover:border-brandLight/55 text-brandLight text-xs font-bold uppercase tracking-widest rounded-xl transition-all duration-150 active:scale-95"
                  >
                    Back
                  </button>
                  <button
                    type="submit"
                    className="flex-[2] py-3.5 bg-brandLight text-brandDark hover:bg-white text-xs font-black uppercase tracking-widest rounded-xl transition-all duration-200 active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-brandLight/5"
                  >
                    {paymentMethod === 'COD' ? 'Confirm COD Order' : 'Authorize Payment'}
                  </button>
                </div>
              </form>
            )}

            {/* 3. PROCESSING STEP */}
            {step === 3 && (
              <div className="py-12 flex flex-col items-center justify-center text-center space-y-6">
                <Loader2 className="w-14 h-14 text-pink-500 animate-spin" />
                <div className="space-y-2">
                  <h3 className="text-xl font-bold uppercase tracking-wider text-white">
                    {paymentMethod === 'COD' ? 'Registering COD Order' : 'Authorizing Order'}
                  </h3>
                  <p className="text-sm text-brandLight/60 font-light max-w-xs leading-normal">
                    {paymentMethod === 'COD' 
                      ? 'Creating secure Cash on Delivery order records. Please do not close this window...'
                      : 'Securely communicating with card issuing bank. Please do not close this window...'}
                  </p>
                </div>
              </div>
            )}

            {/* 4. SUCCESS STEP */}
            {step === 4 && (
              <div className="py-8 flex flex-col items-center justify-center text-center space-y-6">
                <div className="w-16 h-16 rounded-full bg-green-500/10 border border-green-500/30 flex items-center justify-center text-green-500">
                  <CheckCircle className="w-10 h-10" />
                </div>

                <div className="space-y-3">
                  <h3 className="text-2xl font-black uppercase tracking-wider text-white">Order Confirmed</h3>
                  <p className="text-sm text-brandLight/65 font-light max-w-xs leading-normal mx-auto">
                    Thank you for supporting BLESSED&apos;s digital drop. Your order has been registered successfully.
                  </p>
                </div>

                <div className="bg-brandDark/50 border border-brandLight/5 p-4 rounded-2xl w-full text-left space-y-1">
                  <div className="flex justify-between text-xs">
                    <span className="text-brandLight/50 font-medium">Order Number:</span>
                    <strong className="text-white font-mono">{orderId}</strong>
                  </div>
                  <div className="flex justify-between text-xs">
                    <span className="text-brandLight/50 font-medium">Payment Mode:</span>
                    <strong className="text-white">
                      {paymentMethod === 'COD' ? 'Cash on Delivery (₹49 COD Fee)' : 'Prepaid (Card Payment)'}
                    </strong>
                  </div>
                  <div className="flex justify-between text-xs">
                    <span className="text-brandLight/50 font-medium">Shipping To:</span>
                    <strong className="text-white truncate max-w-[200px]">{formData.name}</strong>
                  </div>
                </div>

                <button
                  onClick={onClose}
                  className="w-full py-3.5 bg-brandLight text-brandDark hover:bg-white text-xs font-black uppercase tracking-widest rounded-xl transition-all duration-200 active:scale-95"
                >
                  Return to Store
                </button>
              </div>
            )}

          </div>
        </div>
      );
    };

    // ==========================================
    // SIZE CHART MODAL
    // ==========================================
    const SizeChartModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          {/* Backdrop */}
          <div className="fixed inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose} />
          
          {/* Modal Card */}
          <div className="relative w-full max-w-xl bg-zinc-900 border border-brandLight/10 rounded-[32px] shadow-2xl p-6 text-brandLight z-55 overflow-hidden max-h-[90vh] flex flex-col items-center">
            <button 
              onClick={onClose}
              className="absolute top-6 right-6 p-1 rounded-full hover:bg-zinc-800 text-brandLight/60 hover:text-white transition-colors z-10"
            >
              <X className="w-5 h-5" />
            </button>
            
            <h3 className="text-lg font-bold uppercase tracking-wider text-white mb-6">Size Guide</h3>
            
            <div className="w-full flex-1 overflow-auto rounded-2xl bg-[#f7f5ee] p-4 flex items-center justify-center">
              <img 
                src="/size_chart.png" 
                alt="Size Chart" 
                className="w-full h-auto object-contain max-h-[60vh] mx-auto rounded-lg shadow-sm"
              />
            </div>
            
            <button
              onClick={onClose}
              className="mt-6 w-full py-3.5 bg-brandLight text-brandDark hover:bg-white text-xs font-black uppercase tracking-widest rounded-xl transition-all duration-200 active:scale-95"
            >
              Close Guide
            </button>
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN APP CONTAINER
    // ==========================================
    const App = () => {
      const [cart, setCart] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [isSizeChartOpen, setIsSizeChartOpen] = useState(false);
      const [categoryFilter, setCategoryFilter] = useState('all');
      const [products, setProducts] = useState(PRODUCTS);

      // Fetch products dynamically from products.json when component mounts
      useEffect(() => {
        fetch('/products.json')
          .then(res => {
            if (!res.ok) throw new Error('Network response was not ok');
            return res.json();
          })
          .then(data => {
            if (data && Array.isArray(data)) {
              setProducts(data);
            }
          })
          .catch(err => {
            console.warn('Failed to load products from products.json, falling back to static products.', err);
          });
      }, []);

      // Scroll lock when drawers/modals are active
      useEffect(() => {
        if (isCartOpen || isCheckoutOpen || isSizeChartOpen) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = 'unset';
        }
        return () => {
          document.body.style.overflow = 'unset';
        };
      }, [isCartOpen, isCheckoutOpen, isSizeChartOpen]);

      // Cart modifiers
      const handleAddToCart = (product, size, color) => {
        setCart(prev => {
          // Check if item with same configuration already in cart
          const existingIdx = prev.findIndex(
            item => item.product.id === product.id && item.size === size && item.color.name === color.name
          );

          if (existingIdx > -1) {
            const nextCart = [...prev];
            nextCart[existingIdx].quantity += 1;
            return nextCart;
          } else {
            return [...prev, { product, size, color, quantity: 1 }];
          }
        });
        
        // Open drawer on add
        setIsCartOpen(true);
      };

      const handleBuyNow = (product, size, color) => {
        // Clear cart first or just replace with this item
        setCart([{ product, size, color, quantity: 1 }]);
        // Trigger checkout directly
        setIsCheckoutOpen(true);
      };

      const handleUpdateQuantity = (index, delta) => {
        setCart(prev => {
          const nextCart = [...prev];
          const newQty = nextCart[index].quantity + delta;
          if (newQty <= 0) {
            nextCart.splice(index, 1);
          } else {
            nextCart[index].quantity = newQty;
          }
          return nextCart;
        });
      };

      const handleRemoveItem = (index) => {
        setCart(prev => {
          const nextCart = [...prev];
          nextCart.splice(index, 1);
          return nextCart;
        });
      };

      const handleOrderComplete = () => {
        // Empty cart upon successful order
        setCart([]);
      };

      const scrollIntoView = (id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      };

      // Select Category from Categories section: sets filter and scrolls to shop
      const handleSelectCategory = (type) => {
        setCategoryFilter(type);
        scrollIntoView('shop');
      };

      return (
        <div className="relative w-full min-h-screen bg-brandDark text-brandLight overflow-x-clip flex flex-col">
          {/* Main Layout Sections */}
          <HeroSection 
            onContactClick={() => handleSelectCategory('all')}
            cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)}
            onCartOpen={() => setIsCartOpen(true)}
          />
          <MarqueeSection />
          <AboutSection onContactClick={() => handleSelectCategory('all')} />
          <ServicesSection />
          
          {/* Workable Shop Section */}
          <ShopSection 
            onAddToCart={handleAddToCart}
            onBuyNow={handleBuyNow}
            activeFilter={categoryFilter}
            onFilterChange={setCategoryFilter}
            products={products}
            onOpenSizeChart={() => setIsSizeChartOpen(true)}
          />
          
          {/* Size Chart Modal */}
          <SizeChartModal 
            isOpen={isSizeChartOpen}
            onClose={() => setIsSizeChartOpen(false)}
          />
          
          {/* Categories Section (Converted from Capsules/Projects) */}
          <CategoriesSection onSelectCategory={handleSelectCategory} />

          {/* Simple Premium Footer */}
          <footer id="contact" className="bg-brandDark border-t border-brandLight/10 py-16 px-6 md:px-10 text-center relative z-40 text-brandLight/50 select-none">
            <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
              <span className="font-extrabold uppercase tracking-widest text-brandLight">
                BLESSED<span className="text-pink-600 font-black">.</span>STUDIO
              </span>
              <div className="flex gap-8 text-xs uppercase font-semibold tracking-widest">
                <a href="#about" className="hover:text-white transition-colors">About</a>
                <a href="#shop" className="hover:text-white transition-colors">Shop</a>
                <a href="#categories" className="hover:text-white transition-colors">Categories</a>
                <a href="mailto:contact@blessed.studio" className="hover:text-white transition-colors">Email</a>
              </div>
              <span className="text-xs font-light">
                &copy; {new Date().getFullYear()} BLESSED. ALL RIGHTS RESERVED.
              </span>
            </div>
          </footer>

          {/* Shopping Cart Drawer */}
          <CartDrawer 
            isOpen={isCartOpen}
            onClose={() => setIsCartOpen(false)}
            cartItems={cart}
            onUpdateQuantity={handleUpdateQuantity}
            onRemoveItem={handleRemoveItem}
            onCheckout={() => {
              setIsCartOpen(false);
              setIsCheckoutOpen(true);
            }}
          />

          {/* Checkout Modal */}
          <CheckoutModal 
            isOpen={isCheckoutOpen}
            onClose={() => setIsCheckoutOpen(false)}
            cartItems={cart}
            onOrderComplete={handleOrderComplete}
          />
        </div>
      );
    };

    // Render the React application into the root element
    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    root.render(<App />);

    // Register Service Worker for PWA / Google Play Store Compatibility
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered successfully!', reg.scope))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
